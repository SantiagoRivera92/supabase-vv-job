name: Daily Card Update

on:
  schedule:
    - cron: '30 11 * * *'
  workflow_dispatch: 

jobs:
  update-cards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          
      - name: Run Update Script
        run: deno run --allow-read --allow-net --allow-env --allow-write update-cards.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
